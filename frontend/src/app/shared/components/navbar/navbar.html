<header class="navbar">
  <div class="nav-top">
    <a routerLink="/home" class="brand"><span class="brand-leaf">🌿</span>AningKabalen</a>

    <div class="nav-search">
      <input type="text" placeholder="Search fresh produce..." [(ngModel)]="searchTerm" (keyup.enter)="search()">
      <button class="nav-search-btn" (click)="search()" aria-label="Search">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8.5" cy="8.5" r="5.5"/><path d="M15 15l-3-3"/></svg>
      </button>
    </div>

    <div class="nav-right">
      <ng-container *ngIf="auth.isLoggedIn()">
        <a *ngIf="auth.currentUser()?.role==='farmer'" routerLink="/farmer" class="nav-btn active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <span class="nav-name">{{ auth.currentUser()?.name?.split(' ')?.[0] ?? '' }}</span>
        </a>
        <a *ngIf="auth.currentUser()?.role==='admin'" routerLink="/admin" class="nav-btn active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <span class="nav-name">Admin</span>
        </a>
        <a *ngIf="auth.currentUser()?.role==='buyer'" routerLink="/profile" class="nav-btn active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <span class="nav-name">{{ auth.currentUser()?.name?.split(' ')?.[0] ?? '' }}</span>
        </a>
        <button class="nav-btn logout-btn" (click)="logout()" title="Log out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </ng-container>

      <a *ngIf="!auth.isLoggedIn()" routerLink="/login" class="nav-btn nav-login-btn">Sign In</a>

      <div class="nav-sep" *ngIf="auth.isLoggedIn() && auth.currentUser()?.role==='buyer'"></div>

      <a routerLink="/cart" class="nav-btn cart-btn" *ngIf="auth.currentUser()?.role!=='farmer' && auth.currentUser()?.role!=='admin'" title="Cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" *ngIf="cart.count() > 0">{{ cart.count() }}</span>
      </a>
    </div>
  </div>

  <div class="nav-bottom">
    <div class="dept-wrap">
      <button class="dept-btn" (click)="toggleDept($event)">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><rect x="1" y="1" width="7" height="7" rx="1"/><rect x="12" y="1" width="7" height="7" rx="1"/><rect x="1" y="12" width="7" height="7" rx="1"/><rect x="12" y="12" width="7" height="7" rx="1"/></svg>
        All Categories
        <span class="dept-chevron" [class.open]="deptOpen">▾</span>
      </button>
      <div class="dept-dropdown" *ngIf="deptOpen">
        <a *ngFor="let d of departments" class="dept-item" [routerLink]="['/products']" [queryParams]="{category:d.slug}" (click)="closeDept()">
          <div class="dept-item-icon">{{ d.icon }}</div>
          {{ d.label }}
        </a>
      </div>
    </div>

    <nav class="main-nav">
      <a routerLink="/home"        routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="nav-link">Home</a>
      <a routerLink="/products"    routerLinkActive="active" class="nav-link">Products</a>
      <a routerLink="/view-all"    routerLinkActive="active" class="nav-link">All Listings</a>
      <a routerLink="/about"       routerLinkActive="active" class="nav-link">About</a>
      <a routerLink="/contact"     routerLinkActive="active" class="nav-link">Contact</a>
    </nav>

    <div class="nav-end">
      <a routerLink="/reservation" class="nav-help" *ngIf="auth.currentUser()?.role==='buyer' || !auth.isLoggedIn()">📋 Reserve a Crop</a>
    </div>
  </div>
</header>
