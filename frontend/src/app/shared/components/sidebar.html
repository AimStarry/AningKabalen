<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>🌿 AningKabalen</h1>
    <span>Admin Portal</span>
  </div>

  <nav class="sidebar-nav">
    <p class="nav-label">Main Menu</p>
    <a *ngFor="let item of adminNav" class="nav-item"
       [routerLink]="item.route" routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: true }">
      <span class="ni">{{ item.icon }}</span>
      <span>{{ item.label }}</span>
    </a>
  </nav>

  <div class="sidebar-user">
    <div class="s-avatar">{{ userInitials }}</div>
    <div class="s-info">
      <p class="s-name">{{ userName }}</p>
      <p class="s-role">Super Admin</p>
    </div>
  </div>

  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign Out
    </button>
  </div>
</aside>
